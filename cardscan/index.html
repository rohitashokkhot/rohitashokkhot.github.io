<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Card Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #c9a84c;
        --gold-lt: #e8d08a;
        --gold-dk: #7a5e1e;
        --parch: #f5efe2;
        --smoke: #1a1610;
        --smoke2: #110e0a;
        --border: rgba(201, 168, 76, 0.3);
        --border2: rgba(201, 168, 76, 0.15);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        background: var(--smoke2);
        color: var(--parch);
        font-family: "Crimson Pro", Georgia, serif;
        background-image:
          radial-gradient(
            ellipse 100% 50% at 50% 0%,
            rgba(201, 168, 76, 0.07) 0%,
            transparent 65%
          ),
          url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }

      .page {
        max-width: 520px;
        margin: 0 auto;
        padding: 2rem 1rem 5rem;
      }

      /* ── Header ── */
      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .crest {
        width: 60px;
        height: 60px;
        margin: 0 auto 1rem;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .crest-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid var(--gold);
        animation: crest-pulse 3s ease-in-out infinite;
      }
      .crest-ring:nth-child(2) {
        inset: -6px;
        border-color: rgba(201, 168, 76, 0.35);
        animation-delay: 0.5s;
      }
      .crest-ring:nth-child(3) {
        inset: -12px;
        border-color: rgba(201, 168, 76, 0.15);
        animation-delay: 1s;
      }
      @keyframes crest-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .crest-icon {
        color: var(--gold);
        z-index: 1;
      }

      h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(1.4rem, 5vw, 1.9rem);
        font-weight: 700;
        letter-spacing: 0.15em;
        color: var(--gold-lt);
        text-transform: uppercase;
        line-height: 1.1;
      }
      .subtitle {
        margin-top: 0.5rem;
        font-size: 1rem;
        color: rgba(245, 239, 226, 0.4);
        font-style: italic;
      }

      /* ── Viewfinder ── */
      .vf-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 3/4;
        background: #060503;
        border-radius: 6px;
        overflow: hidden;
        border: 0.5px solid var(--border);
        box-shadow:
          0 0 40px rgba(201, 168, 76, 0.05),
          inset 0 0 60px rgba(0, 0, 0, 0.6);
      }

      /* on wide screens switch to landscape-ish ratio */
      @media (min-width: 480px) {
        .vf-wrap {
          aspect-ratio: 4/3;
        }
      }

      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.8s;
      }
      #video.live {
        opacity: 1;
      }

      .vf-idle {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        color: rgba(201, 168, 76, 0.35);
        pointer-events: none;
        transition: opacity 0.5s;
      }
      .vf-idle.hidden {
        opacity: 0;
      }
      .vf-idle-label {
        font-family: "Cinzel", serif;
        font-size: 0.68rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      /* targeting brackets */
      .br {
        position: absolute;
        width: 28px;
        height: 28px;
        border-color: var(--gold);
        border-style: solid;
        border-width: 0;
        pointer-events: none;
        z-index: 3;
      }
      .br.tl {
        top: 8%;
        left: 6%;
        border-top-width: 2px;
        border-left-width: 2px;
        border-radius: 3px 0 0 0;
      }
      .br.tr {
        top: 8%;
        right: 6%;
        border-top-width: 2px;
        border-right-width: 2px;
        border-radius: 0 3px 0 0;
      }
      .br.bl {
        bottom: 8%;
        left: 6%;
        border-bottom-width: 2px;
        border-left-width: 2px;
        border-radius: 0 0 0 3px;
      }
      .br.br-el {
        bottom: 8%;
        right: 6%;
        border-bottom-width: 2px;
        border-right-width: 2px;
        border-radius: 0 0 3px 0;
      }

      /* title zone hint */
      .title-zone {
        position: absolute;
        left: 6%;
        right: 6%;
        top: 8%;
        height: 18%;
        border: 1px dashed rgba(201, 168, 76, 0.25);
        border-radius: 3px;
        pointer-events: none;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .title-zone-label {
        font-family: "Cinzel", serif;
        font-size: 0.58rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.4);
      }

      /* scan beam */
      #beam {
        position: absolute;
        left: 6%;
        right: 6%;
        height: 2px;
        background: linear-gradient(
          to right,
          transparent 0%,
          var(--gold) 30%,
          #fff8e0 50%,
          var(--gold) 70%,
          transparent 100%
        );
        top: 8%;
        opacity: 0;
        pointer-events: none;
        z-index: 4;
        filter: blur(0.5px);
      }
      #beam.on {
        opacity: 1;
        animation: sweep 1.6s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }
      @keyframes sweep {
        0%,
        100% {
          top: 9%;
        }
        50% {
          top: 88%;
        }
      }

      /* vignette */
      .vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background: radial-gradient(
          ellipse 85% 85% at 50% 50%,
          transparent 50%,
          rgba(6, 5, 3, 0.65) 100%
        );
      }

      /* ── Status ── */
      .status-bar {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.6rem 0;
        min-height: 2rem;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.2);
        flex-shrink: 0;
        transition: background 0.4s;
      }
      .dot.active {
        background: var(--gold);
        animation: blink 1.4s ease-in-out infinite;
      }
      .dot.ok {
        background: #4ade80;
      }
      .dot.err {
        background: #f87171;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }
      #status-msg {
        font-size: 0.9rem;
        color: rgba(245, 239, 226, 0.5);
        font-style: italic;
        line-height: 1.3;
      }

      /* ── Progress bar (OCR load) ── */
      .prog-wrap {
        margin: 0 0 0.75rem;
        display: none;
      }
      .prog-wrap.show {
        display: block;
      }
      .prog-track {
        height: 3px;
        background: rgba(201, 168, 76, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #prog {
        height: 100%;
        width: 0;
        background: linear-gradient(to right, var(--gold-dk), var(--gold-lt));
        border-radius: 2px;
        transition: width 0.3s;
      }
      #prog-msg {
        font-size: 0.75rem;
        color: rgba(245, 239, 226, 0.3);
        margin-top: 4px;
      }

      /* ── Buttons ── */
      .btn-row {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        gap: 0.6rem;
        margin: 0.75rem 0 1rem;
      }

      .btn {
        padding: 0.7rem 0.5rem;
        border-radius: 3px;
        border: 0.5px solid rgba(201, 168, 76, 0.3);
        background: transparent;
        color: rgba(245, 239, 226, 0.65);
        font-family: "Cinzel", serif;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.18s;
        white-space: nowrap;
      }
      .btn:hover:not(:disabled) {
        background: rgba(201, 168, 76, 0.09);
        border-color: rgba(201, 168, 76, 0.55);
        color: var(--gold-lt);
      }
      .btn:active:not(:disabled) {
        transform: scale(0.96);
      }
      .btn:disabled {
        opacity: 0.28;
        cursor: default;
      }
      .btn.primary {
        background: rgba(201, 168, 76, 0.13);
        border-color: var(--gold);
        color: var(--gold-lt);
        font-weight: 600;
      }
      .btn.primary:hover:not(:disabled) {
        background: rgba(201, 168, 76, 0.24);
      }
      .btn.scanning-btn {
        border-color: rgba(74, 222, 128, 0.5);
        color: #4ade80;
      }

      /* ── Result panel ── */
      #result {
        margin-top: 0.25rem;
      }

      .r-card {
        border: 0.5px solid var(--border);
        border-radius: 5px;
        overflow: hidden;
        animation: rise 0.35s ease;
      }
      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .r-card.match {
        border-color: rgba(74, 222, 128, 0.4);
      }
      .r-card.no-match {
        border-color: rgba(248, 113, 113, 0.3);
      }

      .r-head {
        padding: 0.65rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        border-bottom: 0.5px solid var(--border2);
        background: rgba(201, 168, 76, 0.04);
      }
      .pill {
        font-family: "Cinzel", serif;
        font-size: 0.6rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 2px 9px;
        border-radius: 2px;
        flex-shrink: 0;
      }
      .pill.ok {
        background: rgba(74, 222, 128, 0.1);
        color: #4ade80;
        border: 0.5px solid rgba(74, 222, 128, 0.3);
      }
      .pill.bad {
        background: rgba(248, 113, 113, 0.08);
        color: #f87171;
        border: 0.5px solid rgba(248, 113, 113, 0.2);
      }
      .r-conf {
        font-size: 0.8rem;
        color: rgba(245, 239, 226, 0.35);
        font-style: italic;
      }

      .r-body {
        padding: 1rem 1rem 1.1rem;
      }

      /* card type badge */
      .type-badge {
        display: inline-block;
        font-family: "Cinzel", serif;
        font-size: 0.58rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 2px;
        margin-bottom: 0.5rem;
        background: rgba(201, 168, 76, 0.1);
        color: var(--gold);
        border: 0.5px solid var(--border2);
      }

      .r-title {
        font-family: "Cinzel", serif;
        font-size: 1.3rem;
        font-weight: 600;
        color: var(--gold-lt);
        letter-spacing: 0.05em;
        margin-bottom: 0.25rem;
        line-height: 1.2;
      }
      .r-flavor {
        font-size: 1rem;
        font-style: italic;
        color: rgba(245, 239, 226, 0.45);
        margin-bottom: 0.85rem;
        line-height: 1.5;
      }

      /* stat grid */
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.4rem;
        margin-bottom: 0.9rem;
      }
      .stat {
        background: rgba(0, 0, 0, 0.3);
        border: 0.5px solid var(--border2);
        border-radius: 3px;
        padding: 0.4rem 0.6rem;
      }
      .stat-key {
        font-family: "Cinzel", serif;
        font-size: 0.58rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.4);
        margin-bottom: 1px;
      }
      .stat-val {
        font-size: 0.88rem;
        color: rgba(245, 239, 226, 0.75);
        font-weight: 600;
      }

      .r-desc {
        font-size: 0.95rem;
        line-height: 1.7;
        color: rgba(245, 239, 226, 0.65);
        margin-bottom: 1rem;
        border-left: 2px solid rgba(201, 168, 76, 0.2);
        padding-left: 0.85rem;
      }

      /* abilities */
      .abilities {
        margin-bottom: 1rem;
      }
      .ability {
        display: flex;
        gap: 0.6rem;
        align-items: flex-start;
        padding: 0.5rem 0.65rem;
        border-radius: 3px;
        border: 0.5px solid var(--border2);
        margin-bottom: 0.4rem;
        background: rgba(201, 168, 76, 0.02);
      }
      .ability-icon {
        font-size: 0.9rem;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .ability-name {
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        letter-spacing: 0.06em;
        color: var(--gold);
        margin-bottom: 1px;
      }
      .ability-desc {
        font-size: 0.85rem;
        color: rgba(245, 239, 226, 0.55);
        line-height: 1.5;
      }

      .r-lore {
        font-size: 0.82rem;
        font-style: italic;
        color: rgba(245, 239, 226, 0.3);
        border-top: 0.5px solid var(--border2);
        padding-top: 0.75rem;
        line-height: 1.6;
      }

      .learn-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.9rem;
        font-family: "Cinzel", serif;
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        text-decoration: none;
        border: 0.5px solid rgba(201, 168, 76, 0.35);
        padding: 0.45rem 1rem;
        border-radius: 2px;
        transition: all 0.2s;
      }
      .learn-btn:hover {
        background: rgba(201, 168, 76, 0.1);
        border-color: var(--gold);
        color: var(--gold-lt);
      }

      /* detected text raw */
      .raw {
        margin-top: 0.85rem;
        padding: 0.6rem 0.8rem;
        background: rgba(0, 0, 0, 0.35);
        border-radius: 3px;
        border: 0.5px solid var(--border2);
      }
      .raw-lbl {
        font-size: 0.62rem;
        font-family: "Cinzel", serif;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.3);
        margin-bottom: 3px;
      }
      .raw-val {
        font-family: "Courier New", monospace;
        font-size: 0.78rem;
        color: rgba(245, 239, 226, 0.3);
        white-space: pre-wrap;
        max-height: 64px;
        overflow-y: auto;
        line-height: 1.5;
      }

      /* ── Browse panel ── */
      .browse-toggle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.45);
        margin-top: 1.5rem;
        user-select: none;
        width: fit-content;
      }
      .browse-toggle .arrow {
        font-size: 0.62rem;
        transition: transform 0.2s;
      }
      .browse-toggle.open .arrow {
        transform: rotate(180deg);
      }

      .browse-grid {
        display: none;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .browse-grid.open {
        display: grid;
      }

      .b-card {
        padding: 0.65rem 0.75rem;
        border: 0.5px solid var(--border2);
        border-radius: 4px;
        background: rgba(201, 168, 76, 0.02);
        cursor: pointer;
        transition: all 0.18s;
      }
      .b-card:hover {
        background: rgba(201, 168, 76, 0.07);
        border-color: var(--border);
      }
      .b-card-title {
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        font-weight: 600;
        color: rgba(201, 168, 76, 0.8);
        letter-spacing: 0.04em;
        margin-bottom: 2px;
      }
      .b-card-type {
        font-size: 0.78rem;
        color: rgba(245, 239, 226, 0.35);
        font-style: italic;
      }

      footer {
        text-align: center;
        margin-top: 2.5rem;
        font-size: 0.72rem;
        color: rgba(245, 239, 226, 0.18);
        letter-spacing: 0.05em;
      }
      canvas {
        display: none;
      }

      ::-webkit-scrollbar {
        width: 3px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(201, 168, 76, 0.2);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="crest">
          <div class="crest-ring"></div>
          <div class="crest-ring"></div>
          <div class="crest-ring"></div>
          <svg
            class="crest-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.3"
            stroke-linecap="round"
            stroke-linejoin="round"
            width="24"
            height="24"
          >
            <path
              d="M12 2L15 8.5L22 9.3L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.3L9 8.5Z"
            />
          </svg>
        </div>
        <h1>Board to the Future!</h1>
        <p class="subtitle">Point · Scan · Discover</p>
      </header>

      <!-- Viewfinder -->
      <div class="vf-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="vf-idle" id="vf-idle">
          <svg
            viewBox="0 0 48 48"
            fill="none"
            stroke="currentColor"
            stroke-width="1"
            stroke-linecap="round"
            stroke-linejoin="round"
            width="44"
            height="44"
          >
            <rect x="7" y="11" width="34" height="26" rx="2" />
            <circle cx="24" cy="24" r="7" />
            <path d="M3 16V8h8M45 16V8h-8M3 32v8h8M45 32v8h-8" />
          </svg>
          <span class="vf-idle-label">Camera inactive</span>
        </div>
        <div class="br tl"></div>
        <div class="br tr"></div>
        <div class="br bl"></div>
        <div class="br br-el"></div>
        <div class="title-zone">
          <span class="title-zone-label">Align card title here</span>
        </div>
        <div id="beam"></div>
        <div class="vignette"></div>
      </div>

      <div class="status-bar">
        <div class="dot" id="dot"></div>
        <span id="status-msg">Tap Activate to start the camera</span>
      </div>

      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-track"><div id="prog"></div></div>
        <div id="prog-msg">Loading recognition engine…</div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="btn-start">Activate</button>
        <button class="btn" id="btn-scan" disabled>Scan Card</button>
        <button class="btn" id="btn-stop" disabled>Stop</button>
      </div>

      <div id="result"></div>

      <!-- Browse all cards -->
      <div class="browse-toggle" id="browse-toggle">
        <span>Browse all cards</span>
        <span class="arrow">▾</span>
      </div>
      <div class="browse-grid" id="browse-grid"></div>
    </div>

    <footer>Card Codex · OCR runs entirely on your device</footer>
    <canvas id="snap"></canvas>

    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <script>
      // ═══════════════════════════════════════════════════════════════════
      //  CARD DATABASE
      //  Each card can have:
      //    title       (string)  — displayed name, used for matching
      //    type        (string)  — card category label
      //    flavor      (string)  — short italic tagline
      //    stats       (object)  — key:value pairs shown in stat grid
      //    description (string)  — main lore / rules text
      //    abilities   (array)   — [{icon, name, description}]
      //    lore        (string)  — bottom italic flavour quote
      //    url         (string)  — "Learn more" link (optional)
      // ═══════════════════════════════════════════════════════════════════
      const CARDS = [
        {
          title: "Every roof a power plant",
          type: "Renewable Energy",
          flavor: "Every roof a power plant.",
          stats: {
            Power: "8",
            Toughness: "6",
            Mana: "6🔥🔥🔥",
            Rarity: "Mythic",
          },
          description:
            "Dragon Flame enters the battlefield with three +1/+1 counters. When Dragon Flame attacks, it deals 3 damage to each creature the defending player controls. Its scales are forged in the crucible of volcanic vents, rendering it immune to fire-based spells.",
          abilities: [
            {
              icon: "🔥",
              name: "Inferno Breath",
              description:

      // ═══════════════════════════════════════════════════════════════════
      //  FUZZY MATCHING
      //  Uses a combination of:
      //  1. Levenshtein distance (edit distance) per word
      //  2. Character n-gram overlap
      //  3. Token presence scoring
      // ═══════════════════════════════════════════════════════════════════
      function levenshtein(a, b) {
        const m = a.length,
          n = b.length;
        const dp = Array.from({ length: m + 1 }, (_, i) =>
          Array.from({ length: n + 1 }, (_, j) =>
            i === 0 ? j : j === 0 ? i : 0,
          ),
        );
        for (let i = 1; i <= m; i++)
          for (let j = 1; j <= n; j++)
            dp[i][j] =
              a[i - 1] === b[j - 1]
                ? dp[i - 1][j - 1]
                : 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
        return dp[m][n];
      }

      function ngramOverlap(a, b, n = 2) {
        const grams = (s) => {
          const g = new Set();
          for (let i = 0; i <= s.length - n; i++) g.add(s.slice(i, i + n));
          return g;
        };
        const ga = grams(a),
          gb = grams(b);
        if (!ga.size || !gb.size) return 0;
        let shared = 0;
        ga.forEach((g) => {
          if (gb.has(g)) shared++;
        });
        return shared / Math.max(ga.size, gb.size);
      }

      function scoreCardAgainstText(card, rawText) {
        // normalise: lowercase, collapse whitespace, keep only alphanum+space
        const norm = (s) =>
          s
            .toLowerCase()
            .replace(/[^a-z0-9 ]/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        const text = norm(rawText);
        const title = norm(card.title);

        const textTokens = text.split(" ").filter((t) => t.length > 1);
        const titleTokens = title.split(" ").filter((t) => t.length > 1);

        let score = 0;

        // 1. Full title presence (direct substring after normalisation)
        if (text.includes(title)) score += 100;

        // 2. Per-word fuzzy match
        let wordHits = 0;
        for (const tw of titleTokens) {
          if (tw.length < 2) continue;
          // exact token match
          if (textTokens.includes(tw)) {
            score += 30;
            wordHits++;
            continue;
          }
          // close edit distance (allow ~30% error)
          let bestDist = Infinity;
          for (const tt of textTokens) {
            const d = levenshtein(tw, tt);
            if (d < bestDist) bestDist = d;
          }
          const maxEdits = Math.max(1, Math.floor(tw.length * 0.35));
          if (bestDist <= maxEdits) {
            score += Math.max(5, 25 - bestDist * 5);
            wordHits++;
          }
        }

        // 3. Proportion of title words that were hit
        if (titleTokens.length > 0) {
          score += (wordHits / titleTokens.length) * 40;
        }

        // 4. Bigram overlap between full text and title
        score +=
          ngramOverlap(text.replace(/ /g, ""), title.replace(/ /g, "")) * 30;

        // 5. Character n-gram sliding window in raw text (catches partial reads)
        const titleNoSpace = title.replace(/ /g, "");
        let charHits = 0;
        for (let i = 0; i < titleNoSpace.length - 1; i++) {
          if (text.includes(titleNoSpace.slice(i, i + 2))) charHits++;
        }
        if (titleNoSpace.length > 1)
          score += (charHits / (titleNoSpace.length - 1)) * 20;

        return score;
      }

      function findBestCard(rawText) {
        if (!rawText || rawText.trim().length < 2)
          return { card: null, score: 0 };
        let best = null,
          bestScore = -1;
        for (const card of CARDS) {
          const s = scoreCardAgainstText(card, rawText);
          if (s > bestScore) {
            bestScore = s;
            best = card;
          }
        }
        // Require a minimum score threshold to avoid false positives
        // Threshold: at least 20 (one decent word match or partial bigram hit)
        return { card: bestScore >= 20 ? best : null, score: bestScore };
      }

      // ═══════════════════════════════════════════════════════════════════
      //  DOM + STATE
      // ═══════════════════════════════════════════════════════════════════
      const video = document.getElementById("video");
      const snap = document.getElementById("snap");
      const btnStart = document.getElementById("btn-start");
      const btnScan = document.getElementById("btn-scan");
      const btnStop = document.getElementById("btn-stop");
      const dotEl = document.getElementById("dot");
      const statusEl = document.getElementById("status-msg");
      const beamEl = document.getElementById("beam");
      const resultEl = document.getElementById("result");
      const progWrap = document.getElementById("prog-wrap");
      const progFill = document.getElementById("prog");
      const progMsg = document.getElementById("prog-msg");
      const vfIdle = document.getElementById("vf-idle");
      const browseGrid = document.getElementById("browse-grid");
      const browseTog = document.getElementById("browse-toggle");

      let stream = null;
      let worker = null;
      let ready = false;

      // ── Build browse grid ──
      CARDS.forEach((c, i) => {
        const el = document.createElement("div");
        el.className = "b-card";
        el.innerHTML = `<div class="b-card-title">${c.title}</div><div class="b-card-type">${c.type}</div>`;
        el.addEventListener("click", () => {
          showCard(c, 100, "(manual browse)");
          resultEl.scrollIntoView({ behavior: "smooth" });
        });
        browseGrid.appendChild(el);
      });

      browseTog.addEventListener("click", () => {
        browseGrid.classList.toggle("open");
        browseTog.classList.toggle("open");
      });

      // ── Helpers ──
      function setStatus(msg, state = "idle") {
        statusEl.textContent = msg;
        dotEl.className = "dot" + (state === "idle" ? "" : " " + state);
      }

      function setProgress(pct, msg) {
        progFill.style.width = pct + "%";
        progMsg.textContent = msg;
      }

      // ── OCR Worker init ──
      async function loadWorker() {
        progWrap.classList.add("show");
        setProgress(0, "Loading recognition engine…");
        setStatus("Loading OCR engine…", "active");
        try {
          worker = await Tesseract.createWorker("eng", 1, {
            logger: (m) => {
              if (m.status === "loading tesseract core")
                setProgress(20, "Loading core…");
              if (m.status === "loading language traineddata")
                setProgress(55, "Loading language data…");
              if (m.status === "initializing api")
                setProgress(80, "Initialising…");
              if (m.status === "initialized api")
                setProgress(95, "Almost ready…");
            },
          });

          // Tune Tesseract for card title reading:
          // PSM 6 = uniform block of text; OEM 1 = LSTM neural net
          await worker.setParameters({
            tessedit_pageseg_mode: "6",
            tessedit_ocr_engine_mode: "1",
            // Allow common OCR substitution pairs
            tessedit_char_whitelist:
              "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 '-",
          });

          setProgress(100, "Ready");
          setTimeout(() => progWrap.classList.remove("show"), 800);
          ready = true;
          btnScan.disabled = false;
          setStatus("Ready — point at a card title and tap Scan", "active");
        } catch (e) {
          setProgress(100, "Failed: " + e.message);
          setStatus("OCR failed to load: " + e.message, "err");
        }
      }

      // ── Camera ──
      btnStart.addEventListener("click", async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1920 },
              height: { ideal: 1080 },
            },
          });
          video.srcObject = stream;
          await video.play();
          video.classList.add("live");
          vfIdle.classList.add("hidden");
          btnStart.disabled = true;
          btnStop.disabled = false;
          setStatus("Camera on — loading OCR engine…", "active");
          await loadWorker();
        } catch (e) {
          setStatus("Camera error: " + e.message, "err");
        }
      });

      btnStop.addEventListener("click", () => {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        video.srcObject = null;
        video.classList.remove("live");
        vfIdle.classList.remove("hidden");
        beamEl.classList.remove("on");
        btnStart.disabled = false;
        btnStop.disabled = true;
        btnScan.disabled = true;
        ready = false;
        setStatus("Camera stopped");
      });

      // ── Scan ──
      btnScan.addEventListener("click", async () => {
        if (!ready || !stream) return;

        btnScan.disabled = true;
        btnScan.textContent = "Scanning…";
        btnScan.classList.add("scanning-btn");
        beamEl.classList.add("on");
        setStatus("Recognising text…", "active");

        // Capture frame
        const ctx = snap.getContext("2d");
        snap.width = video.videoWidth || 1280;
        snap.height = video.videoHeight || 720;

        // Focus on the top 30% of the frame where card titles usually live
        // Also do a full-frame scan and take best result
        const regions = [
          // top-third crop (title zone)
          {
            sx: snap.width * 0.05,
            sy: snap.height * 0.05,
            sw: snap.width * 0.9,
            sh: snap.height * 0.3,
          },
          // full frame
          { sx: 0, sy: 0, sw: snap.width, sh: snap.height },
          // middle strip
          {
            sx: snap.width * 0.05,
            sy: snap.height * 0.1,
            sw: snap.width * 0.9,
            sh: snap.height * 0.5,
          },
        ];

        let allText = "";
        for (const r of regions) {
          const c = document.createElement("canvas");
          c.width = Math.round(r.sw);
          c.height = Math.round(r.sh);
          const cx = c.getContext("2d");
          // Enhance contrast for better OCR
          cx.filter = "contrast(1.6) brightness(1.1) saturate(0)";
          cx.drawImage(video, r.sx, r.sy, r.sw, r.sh, 0, 0, c.width, c.height);
          try {
            const {
              data: { text },
            } = await worker.recognize(c);
            allText += " " + text;
          } catch (_) {}
        }

        beamEl.classList.remove("on");

        const { card, score } = findBestCard(allText);
        showCard(card, score, allText);

        btnScan.disabled = false;
        btnScan.textContent = "Scan Card";
        btnScan.classList.remove("scanning-btn");
      });

      // ═══════════════════════════════════════════════════════════════════
      //  RENDER RESULT
      // ═══════════════════════════════════════════════════════════════════
      function confidenceLabel(score) {
        if (score >= 80) return { label: "High confidence", cls: "ok" };
        if (score >= 40) return { label: "Medium confidence", cls: "ok" };
        if (score >= 20) return { label: "Low confidence", cls: "ok" };
        return { label: "No match", cls: "bad" };
      }

      function renderStats(stats) {
        if (!stats || !Object.keys(stats).length) return "";
        return `<div class="stat-grid">${Object.entries(stats)
          .map(
            ([k, v]) => `
    <div class="stat"><div class="stat-key">${k}</div><div class="stat-val">${v}</div></div>`,
          )
          .join("")}
  </div>`;
      }

      function renderAbilities(abilities) {
        if (!abilities || !abilities.length) return "";
        return `<div class="abilities">${abilities
          .map(
            (a) => `
    <div class="ability">
      <div class="ability-icon">${a.icon}</div>
      <div>
        <div class="ability-name">${a.name}</div>
        <div class="ability-desc">${a.description}</div>
      </div>
    </div>`,
          )
          .join("")}
  </div>`;
      }

      function showCard(card, score, rawText) {
        if (!card) {
          setStatus(
            "No card matched — try better lighting or hold steady",
            "err",
          );
          resultEl.innerHTML = `
      <div class="r-card no-match">
        <div class="r-head"><span class="pill bad">No Match</span></div>
        <div class="r-body">
          <div class="r-desc" style="border-color:rgba(248,113,113,0.2)">
            The scanner couldn't match any card. Tips:<br>
            • Ensure the card title is inside the dashed box<br>
            • Use good lighting — avoid glare<br>
            • Hold the phone still for a moment before scanning<br>
            • Try the Browse panel below to find a card manually
          </div>
          ${rawText ? `<div class="raw"><div class="raw-lbl">Detected text</div><div class="raw-val">${rawText.trim().slice(0, 200)}</div></div>` : ""}
        </div>
      </div>`;
          return;
        }

        const conf = confidenceLabel(score);
        setStatus("Identified: " + card.title, "ok");

        resultEl.innerHTML = `
    <div class="r-card match">
      <div class="r-head">
        <span class="pill ok">Identified</span>
        <span class="r-conf">${conf.label} (${Math.round(Math.min(score, 100))}%)</span>
      </div>
      <div class="r-body">
        <div class="type-badge">${card.type}</div>
        <div class="r-title">${card.title}</div>
        ${card.flavor ? `<div class="r-flavor">${card.flavor}</div>` : ""}
        ${renderStats(card.stats)}
        <div class="r-desc">${card.description}</div>
        ${renderAbilities(card.abilities)}
        ${card.lore ? `<div class="r-lore">${card.lore}</div>` : ""}
        ${
          card.url
            ? `<a class="learn-btn" href="${card.url}" target="_blank" rel="noopener">
          Full card details
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><path d="M2 6h8M6 2l4 4-4 4"/></svg>
        </a>`
            : ""
        }
        <div class="raw"><div class="raw-lbl">Detected text</div><div class="raw-val">${(rawText || "").trim().slice(0, 180)}</div></div>
      </div>
    </div>`;

        resultEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    </script>
