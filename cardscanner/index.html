<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Scanner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #c9a84c;
        --gold-lt: #e8d08a;
        --gold-dk: #7a5e1e;
        --ink: #0e0c0a;
        --parch: #f5efe2;
        --parch2: #ede3cf;
        --smoke: #2a2318;
        --smoke2: #1a1610;
        --red: #8b2a2a;
        --green: #2a6645;
        --border: rgba(201, 168, 76, 0.35);
      }

      html,
      body {
        min-height: 100%;
        background: var(--smoke2);
        color: var(--parch);
        font-family: "Crimson Pro", Georgia, serif;
      }

      body {
        background-image:
          radial-gradient(
            ellipse 80% 60% at 50% -10%,
            rgba(201, 168, 76, 0.08) 0%,
            transparent 70%
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 39px,
            rgba(201, 168, 76, 0.03) 39px,
            rgba(201, 168, 76, 0.03) 40px
          ),
          repeating-linear-gradient(
            90deg,
            transparent,
            transparent 39px,
            rgba(201, 168, 76, 0.03) 39px,
            rgba(201, 168, 76, 0.03) 40px
          );
      }

      /* ── Layout ── */
      .page {
        max-width: 560px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 4rem;
      }

      /* ── Header ── */
      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      .emblem {
        width: 52px;
        height: 52px;
        margin: 0 auto 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1.5px solid var(--gold);
        border-radius: 50%;
        color: var(--gold);
        font-size: 22px;
        position: relative;
      }
      .emblem::before,
      .emblem::after {
        content: "";
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 0.5px solid rgba(201, 168, 76, 0.2);
      }
      .emblem::after {
        inset: -11px;
        border-color: rgba(201, 168, 76, 0.1);
      }

      h1 {
        font-family: "Cinzel", serif;
        font-size: 1.7rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: var(--gold-lt);
        text-transform: uppercase;
        line-height: 1.15;
      }
      .subtitle {
        margin-top: 0.4rem;
        font-size: 0.95rem;
        color: rgba(245, 239, 226, 0.45);
        font-style: italic;
        letter-spacing: 0.04em;
      }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.5rem 0;
        color: rgba(201, 168, 76, 0.4);
        font-size: 0.7rem;
        letter-spacing: 0.15em;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 0.5px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(201, 168, 76, 0.3),
          transparent
        );
      }

      /* ── Viewfinder ── */
      .viewfinder-wrap {
        position: relative;
        width: 100%;
        aspect-ratio: 4/3;
        background: #050403;
        border-radius: 4px;
        overflow: hidden;
        border: 0.5px solid var(--border);
      }
      #video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.6s;
      }
      #video.live {
        opacity: 1;
      }

      .vf-idle {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        color: rgba(201, 168, 76, 0.4);
        pointer-events: none;
        transition: opacity 0.4s;
      }
      .vf-idle.hidden {
        opacity: 0;
      }
      .vf-idle svg {
        width: 40px;
        height: 40px;
      }
      .vf-idle span {
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      /* corner brackets */
      .bracket {
        position: absolute;
        width: 22px;
        height: 22px;
        border-color: var(--gold);
        border-style: solid;
        border-width: 0;
        pointer-events: none;
        z-index: 2;
      }
      .bracket.tl {
        top: 12%;
        left: 8%;
        border-top-width: 1.5px;
        border-left-width: 1.5px;
        border-radius: 3px 0 0 0;
      }
      .bracket.tr {
        top: 12%;
        right: 8%;
        border-top-width: 1.5px;
        border-right-width: 1.5px;
        border-radius: 0 3px 0 0;
      }
      .bracket.bl {
        bottom: 12%;
        left: 8%;
        border-bottom-width: 1.5px;
        border-left-width: 1.5px;
        border-radius: 0 0 0 3px;
      }
      .bracket.br {
        bottom: 12%;
        right: 8%;
        border-bottom-width: 1.5px;
        border-right-width: 1.5px;
        border-radius: 0 0 3px 0;
      }

      /* scan beam */
      #beam {
        position: absolute;
        left: 8%;
        right: 8%;
        height: 1.5px;
        background: linear-gradient(
          to right,
          transparent,
          var(--gold),
          transparent
        );
        top: 12%;
        opacity: 0;
        pointer-events: none;
        z-index: 3;
        box-shadow: 0 0 8px 1px rgba(201, 168, 76, 0.35);
      }
      #beam.scanning {
        opacity: 1;
        animation: beam-sweep 1.5s ease-in-out infinite;
      }
      @keyframes beam-sweep {
        0% {
          top: 14%;
        }
        50% {
          top: 82%;
        }
        100% {
          top: 14%;
        }
      }

      /* vignette */
      .vf-vignette {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background: radial-gradient(
          ellipse 80% 80% at 50% 50%,
          transparent 55%,
          rgba(5, 4, 3, 0.55) 100%
        );
      }

      /* ── Status ── */
      .status-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-height: 1.6rem;
        margin: 0.75rem 0;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.3);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .status-dot.active {
        background: var(--gold);
        animation: pulse-dot 1.4s ease-in-out infinite;
      }
      .status-dot.success {
        background: #4ade80;
        animation: none;
      }
      .status-dot.error {
        background: #f87171;
        animation: none;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      #status-msg {
        font-size: 0.88rem;
        color: rgba(245, 239, 226, 0.55);
        font-style: italic;
      }

      /* ── Progress ── */
      .progress-wrap {
        margin: 0.5rem 0 1rem;
        display: none;
      }
      .progress-wrap.visible {
        display: block;
      }
      .progress-track {
        height: 3px;
        background: rgba(201, 168, 76, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      #prog-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(to right, var(--gold-dk), var(--gold));
        border-radius: 2px;
        transition: width 0.25s;
      }
      #prog-label {
        font-size: 0.75rem;
        color: rgba(245, 239, 226, 0.35);
        margin-top: 5px;
        letter-spacing: 0.04em;
      }

      /* ── Buttons ── */
      .btn-row {
        display: flex;
        gap: 0.75rem;
        margin: 1rem 0;
      }

      .btn {
        flex: 1;
        padding: 0.65rem 1rem;
        border-radius: 3px;
        border: 0.5px solid rgba(201, 168, 76, 0.3);
        background: transparent;
        color: rgba(245, 239, 226, 0.7);
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover:not(:disabled) {
        background: rgba(201, 168, 76, 0.08);
        border-color: rgba(201, 168, 76, 0.6);
        color: var(--gold-lt);
      }
      .btn:active:not(:disabled) {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .btn.primary {
        background: rgba(201, 168, 76, 0.12);
        border-color: var(--gold);
        color: var(--gold-lt);
      }
      .btn.primary:hover:not(:disabled) {
        background: rgba(201, 168, 76, 0.22);
      }

      /* ── Result ── */
      #result-area {
        margin-top: 0.5rem;
      }

      .result-card {
        border: 0.5px solid var(--border);
        border-radius: 4px;
        overflow: hidden;
        animation: fade-up 0.4s ease;
      }
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .result-card.match {
        border-color: rgba(74, 222, 128, 0.35);
      }
      .result-card.no-match {
        border-color: rgba(248, 113, 113, 0.25);
      }

      .result-header {
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
        border-bottom: 0.5px solid var(--border);
        background: rgba(201, 168, 76, 0.04);
      }
      .result-header .badge {
        font-family: "Cinzel", serif;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 2px 8px;
        border-radius: 2px;
      }
      .badge.found {
        background: rgba(74, 222, 128, 0.12);
        color: #4ade80;
        border: 0.5px solid rgba(74, 222, 128, 0.3);
      }
      .badge.unknown {
        background: rgba(248, 113, 113, 0.1);
        color: #f87171;
        border: 0.5px solid rgba(248, 113, 113, 0.25);
      }

      .result-body {
        padding: 1rem;
      }

      .card-name {
        font-family: "Cinzel", serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--gold-lt);
        letter-spacing: 0.06em;
        margin-bottom: 0.3rem;
      }
      .card-desc {
        font-size: 0.95rem;
        color: rgba(245, 239, 226, 0.6);
        font-style: italic;
        line-height: 1.6;
        margin-bottom: 0.9rem;
      }

      .learn-link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold);
        text-decoration: none;
        border: 0.5px solid rgba(201, 168, 76, 0.4);
        padding: 0.45rem 1rem;
        border-radius: 2px;
        transition: all 0.2s;
      }
      .learn-link:hover {
        background: rgba(201, 168, 76, 0.1);
        border-color: var(--gold);
        color: var(--gold-lt);
      }
      .learn-link svg {
        width: 12px;
        height: 12px;
      }

      .raw-block {
        margin-top: 0.85rem;
        padding: 0.65rem 0.85rem;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 3px;
        border: 0.5px solid rgba(201, 168, 76, 0.1);
      }
      .raw-label {
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.35);
        margin-bottom: 0.4rem;
        font-family: "Cinzel", serif;
      }
      .raw-text {
        font-family: "Courier New", monospace;
        font-size: 0.78rem;
        color: rgba(245, 239, 226, 0.35);
        white-space: pre-wrap;
        max-height: 72px;
        overflow-y: auto;
        line-height: 1.5;
      }

      /* ── Cards legend ── */
      details {
        margin-top: 1.5rem;
      }
      summary {
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: rgba(201, 168, 76, 0.5);
        cursor: pointer;
        list-style: none;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        user-select: none;
      }
      summary::after {
        content: "▾";
        font-size: 0.65rem;
      }
      details[open] summary::after {
        content: "▴";
      }
      summary::-webkit-details-marker {
        display: none;
      }

      .card-list {
        margin-top: 0.75rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.5rem;
      }
      .card-chip {
        padding: 0.45rem 0.7rem;
        border: 0.5px solid var(--border);
        border-radius: 3px;
        font-size: 0.82rem;
        color: rgba(245, 239, 226, 0.5);
        background: rgba(201, 168, 76, 0.03);
      }
      .card-chip strong {
        display: block;
        font-family: "Cinzel", serif;
        font-size: 0.72rem;
        font-weight: 600;
        color: rgba(201, 168, 76, 0.7);
        margin-bottom: 1px;
      }

      /* ── Footer ── */
      footer {
        text-align: center;
        margin-top: 3rem;
        font-size: 0.75rem;
        color: rgba(245, 239, 226, 0.2);
        letter-spacing: 0.05em;
      }

      canvas {
        display: none;
      }

      /* scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(201, 168, 76, 0.2);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="emblem">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linecap="round"
            stroke-linejoin="round"
            width="22"
            height="22"
          >
            <path
              d="M12 2L15 8.5L22 9.3L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.3L9 8.5Z"
            />
          </svg>
        </div>
        <h1>Card Codex</h1>
        <p class="subtitle">Arcane identification through sight</p>
      </header>

      <!-- Viewfinder -->
      <div class="viewfinder-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="vf-idle" id="vf-idle">
          <svg
            viewBox="0 0 48 48"
            fill="none"
            stroke="currentColor"
            stroke-width="1.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="8" y="12" width="32" height="24" rx="2" />
            <circle cx="24" cy="24" r="6" />
            <path d="M4 17V9h8M44 17V9h-8M4 31v8h8M44 31v8h-8" />
          </svg>
          <span>Awaiting activation</span>
        </div>
        <div class="bracket tl"></div>
        <div class="bracket tr"></div>
        <div class="bracket bl"></div>
        <div class="bracket br"></div>
        <div id="beam"></div>
        <div class="vf-vignette"></div>
      </div>

      <!-- Status -->
      <div class="status-row">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-msg">Awaiting activation</span>
      </div>

      <!-- Progress -->
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-track"><div id="prog-fill"></div></div>
        <div id="prog-label">Loading…</div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button class="btn primary" id="btn-start">Activate</button>
        <button class="btn" id="btn-scan" disabled>Identify</button>
        <button class="btn" id="btn-stop" disabled>Dismiss</button>
      </div>

      <!-- Result -->
      <div id="result-area"></div>

      <!-- Card legend -->
      <details>
        <summary>Registered cards</summary>
        <div class="card-list" id="card-list"></div>
      </details>
    </div>
    <!-- /page -->

    <footer>Card Codex · All recognition performed locally</footer>

    <canvas id="snap"></canvas>

    <script src="https://unpkg.com/tesseract.js@5.1.0/dist/tesseract.min.js"></script>
    <script>
      // ─────────────────────────────────────────────
      //  CARD DATABASE — edit this to match your game
      // ─────────────────────────────────────────────
      const CARDS = [
        {
          title: "First look at the flow",
          keywords: ["dragon", "flame"],
          description:
            "A fierce dragon unleashes scorching fire upon all who dare oppose it.",
          url: "https://example.com/cards/dragon-flame",
        },
        {
          title: "Every roof a power plant",
          keywords: ["forest", "spirit"],
          description:
            "An ancient guardian of the woodland realm, awakened by forgotten prayers.",
          url: "https://example.com/cards/forest-spirit",
        },
        {
          title: "Thunder Strike",
          keywords: ["thunder", "strike"],
          description:
            "Calls down lightning from gathering storm clouds above the battlefield.",
          url: "https://example.com/cards/thunder-strike",
        },
        {
          title: "Frost Wisp",
          keywords: ["frost", "wisp"],
          description:
            "A flickering specter woven from the coldest reaches of the northern wastes.",
          url: "https://example.com/cards/frost-wisp",
        },
        {
          title: "Iron Golem",
          keywords: ["iron", "golem"],
          description:
            "A towering construct of living metal, bound by ancient arcane seals.",
          url: "https://example.com/cards/iron-golem",
        },
        {
          title: "Shadow Rogue",
          keywords: ["shadow", "rogue"],
          description:
            "Strikes from the darkness before vanishing without a trace.",
          url: "https://example.com/cards/shadow-rogue",
        },
        {
          title: "Solar Flare",
          keywords: ["solar", "flare", "sun"],
          description:
            "Channels the raw and blinding energy of the sun into a single devastating burst.",
          url: "https://example.com/cards/solar-flare",
        },
        {
          title: "Sea Serpent",
          keywords: ["sea", "serpent", "ocean"],
          description:
            "A legendary beast of the deep ocean, older than the ships that sail above.",
          url: "https://example.com/cards/sea-serpent",
        },
      ];

      // ─────────────────────────────────────────────
      //  DOM refs
      // ─────────────────────────────────────────────
      const video = document.getElementById("video");
      const snap = document.getElementById("snap");
      const btnStart = document.getElementById("btn-start");
      const btnScan = document.getElementById("btn-scan");
      const btnStop = document.getElementById("btn-stop");
      const statusMsg = document.getElementById("status-msg");
      const statusDot = document.getElementById("status-dot");
      const beam = document.getElementById("beam");
      const resultArea = document.getElementById("result-area");
      const progressWrap = document.getElementById("progress-wrap");
      const progFill = document.getElementById("prog-fill");
      const progLabel = document.getElementById("prog-label");
      const vfIdle = document.getElementById("vf-idle");
      const cardList = document.getElementById("card-list");

      let stream = null;
      let worker = null;
      let workerReady = false;

      // ─────────────────────────────────────────────
      //  Build card legend
      // ─────────────────────────────────────────────
      CARDS.forEach((c) => {
        const el = document.createElement("div");
        el.className = "card-chip";
        el.innerHTML = `<strong>${c.title}</strong>${c.keywords.join(", ")}`;
        cardList.appendChild(el);
      });

      // ─────────────────────────────────────────────
      //  Status helpers
      // ─────────────────────────────────────────────
      function setStatus(msg, state = "idle") {
        statusMsg.textContent = msg;
        statusDot.className =
          "status-dot" + (state !== "idle" ? " " + state : "");
      }

      // ─────────────────────────────────────────────
      //  OCR worker
      // ─────────────────────────────────────────────
      async function initWorker() {
        progressWrap.classList.add("visible");
        progFill.style.width = "0%";
        progLabel.textContent = "Summoning the recognition spirit…";
        setStatus("Loading OCR engine…", "active");
        try {
          worker = await Tesseract.createWorker("eng", 1, {
            logger: (m) => {
              if (m.status === "loading tesseract core") {
                progFill.style.width = "20%";
                progLabel.textContent = "Loading core…";
              }
              if (m.status === "loading language traineddata") {
                progFill.style.width = "55%";
                progLabel.textContent = "Loading language data…";
              }
              if (m.status === "initializing api") {
                progFill.style.width = "80%";
                progLabel.textContent = "Initialising…";
              }
            },
          });
          progFill.style.width = "100%";
          progLabel.textContent = "Ready";
          setTimeout(() => progressWrap.classList.remove("visible"), 900);
          workerReady = true;
          btnScan.disabled = false;
          setStatus(
            "Point camera at a card title, then tap Identify",
            "active",
          );
        } catch (e) {
          progLabel.textContent = "Failed: " + e.message;
          setStatus("OCR engine failed to load", "error");
        }
      }

      // ─────────────────────────────────────────────
      //  Camera controls
      // ─────────────────────────────────────────────
      btnStart.addEventListener("click", async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 960 },
            },
          });
          video.srcObject = stream;
          await video.play();
          video.classList.add("live");
          vfIdle.classList.add("hidden");
          btnStart.disabled = true;
          btnStop.disabled = false;
          setStatus("Camera active — loading recognition engine…", "active");
          await initWorker();
        } catch (e) {
          setStatus("Camera error: " + e.message, "error");
        }
      });

      btnStop.addEventListener("click", () => {
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        video.srcObject = null;
        video.classList.remove("live");
        vfIdle.classList.remove("hidden");
        beam.classList.remove("scanning");
        btnStart.disabled = false;
        btnStop.disabled = true;
        btnScan.disabled = true;
        workerReady = false;
        setStatus("Dismissed");
      });

      // ─────────────────────────────────────────────
      //  Scan
      // ─────────────────────────────────────────────
      btnScan.addEventListener("click", async () => {
        if (!workerReady || !stream) return;
        btnScan.disabled = true;
        beam.classList.add("scanning");
        setStatus("Scanning card title…", "active");

        const ctx = snap.getContext("2d");
        snap.width = video.videoWidth || 640;
        snap.height = video.videoHeight || 480;

        // crop to the framed region (80% wide × 70% tall centred)
        const fw = snap.width * 0.8,
          fh = snap.height * 0.7;
        const fx = (snap.width - fw) / 2;
        const fy = (snap.height - fh) / 2;
        ctx.drawImage(video, fx, fy, fw, fh, 0, 0, snap.width, snap.height);

        try {
          const {
            data: { text },
          } = await worker.recognize(snap);
          beam.classList.remove("scanning");
          processOCR(text);
        } catch (e) {
          beam.classList.remove("scanning");
          setStatus("Recognition failed: " + e.message, "error");
          btnScan.disabled = false;
        }
        btnScan.disabled = false;
      });

      // ─────────────────────────────────────────────
      //  Matching
      // ─────────────────────────────────────────────
      function processOCR(rawText) {
        const cleaned = rawText
          .replace(/[^a-zA-Z0-9 \n]/g, " ")
          .toLowerCase()
          .trim();
        setStatus("Consulting the codex…", "active");

        let bestCard = null,
          bestScore = 0;
        for (const card of CARDS) {
          let score = 0;
          for (const kw of card.keywords) {
            if (cleaned.includes(kw)) score += 2;
            else if (cleaned.includes(kw.slice(0, Math.max(4, kw.length - 2))))
              score += 1;
          }
          card.title
            .toLowerCase()
            .split(" ")
            .forEach((tw) => {
              if (tw.length > 3 && cleaned.includes(tw)) score += 1;
            });
          if (score > bestScore) {
            bestScore = score;
            bestCard = card;
          }
        }

        if (bestCard && bestScore >= 2) {
          setStatus("Card identified — " + bestCard.title, "success");
          resultArea.innerHTML = `
      <div class="result-card match">
        <div class="result-header">
          <span class="badge found">Identified</span>
          <span style="font-size:0.82rem;color:rgba(245,239,226,0.4);font-style:italic;">Match confidence: ${Math.min(100, bestScore * 20)}%</span>
        </div>
        <div class="result-body">
          <div class="card-name">${bestCard.title}</div>
          <div class="card-desc">${bestCard.description}</div>
          <a class="learn-link" href="${bestCard.url}" target="_blank" rel="noopener">
            Consult the codex
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 6h8M6 2l4 4-4 4"/>
            </svg>
          </a>
          <div class="raw-block">
            <div class="raw-label">Raw detection</div>
            <div class="raw-text">${rawText.trim()}</div>
          </div>
        </div>
      </div>`;
        } else {
          setStatus("No match found — adjust position and try again", "error");
          resultArea.innerHTML = `
      <div class="result-card no-match">
        <div class="result-header">
          <span class="badge unknown">Unrecognised</span>
        </div>
        <div class="result-body">
          <div class="card-desc">The card could not be matched. Ensure the title is clearly visible and well-lit, then try again.</div>
          <div class="raw-block">
            <div class="raw-label">Raw detection</div>
            <div class="raw-text">${rawText.trim() || "(nothing detected)"}</div>
          </div>
        </div>
      </div>`;
        }
      }
    </script>
  </body>
</html>
